{% extends "base.html" %}
{% block content %}
<style>
/* Force full-width layout */
/* BUG-03: Do NOT use padding shorthand here — it would override the      */
/* sidebar-open padding-left rule in base.html. Set sides individually.   */
main.wrap { max-width: 100% !important; padding-top: 0 !important; padding-right: 0 !important; padding-bottom: 0 !important; }
body:not(.sidebar-open) main.wrap { padding-left: 0 !important; }

/* ── Char bar ───────────────────────────────────────────── */
#char-bar {
  position: sticky; top: 0; z-index: 40;
  display: flex; align-items: center; gap: 10px;
  padding: 7px 14px; background: rgba(6,10,20,.95);
  border-bottom: 1px solid #1e2d45; flex-wrap: wrap;
  backdrop-filter: blur(10px);
}
#char-cards { display: flex; gap: 7px; flex-wrap: wrap; }
.char-card {
  display: flex; align-items: center; gap: 7px;
  padding: 4px 12px 4px 7px; border-radius: 7px; cursor: pointer;
  border: 1px solid #1e2d45; background: #0d1628; transition: all .14s;
  font-size: 13px; color: #9ab;
}
.char-card.active { border-color: #3a8fff; background: #0f2044; color: #c8d4e0; }
.char-card:hover  { border-color: #3a8fff; }
.char-portrait    { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; background: #0d1c30; }
.char-status      { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: #334; }
.char-status.online  { background: #3ef07e; box-shadow: 0 0 4px #3ef07e88; }
#btn-add-widget {
  padding: 4px 14px; border-radius: 7px; font-size: 12px; cursor: pointer;
  border: 1px solid #3a8fff; background: #0f2044; color: #8bbfff; transition: all .14s;
}
#btn-add-widget:hover { background: #163060; }
#btn-reset-layout {
  padding: 4px 10px; border-radius: 7px; font-size: 11px; cursor: pointer;
  border: 1px solid #1e2d45; background: transparent; color: #445; transition: all .14s;
}
#btn-reset-layout:hover { color: #8bbfff; border-color: #3a8fff; }
#dash-refresh-msg { font-size: 11px; color: #334; }

/* ── Widget grid ────────────────────────────────────────── */
#widget-grid {
  display: flex; flex-wrap: wrap; gap: 12px;
  padding: 14px; align-items: flex-start;
}

/* ── Widget ─────────────────────────────────────────────── */
.widget {
  background: #0a1628; border: 1px solid #1a2a40;
  border-radius: 9px; overflow: visible; transition: border-color .14s, box-shadow .14s;
  display: flex; flex-direction: column; min-width: 0; box-sizing: border-box;
  position: relative;  /* needed for resize handle */
}
.widget:hover { border-color: #253a58; }
/* BUG-05: drag classes applied by mouse-event drag (no HTML5 drag) */
.widget.drag-ghost { opacity: .45; border-style: dashed; border-color: #3a8fff; pointer-events: none; }
.widget.drop-target { border-color: #3a8fff; background: #0d1f38; box-shadow: 0 0 0 2px #3a8fff44; }
.widget.pinned > .widget-header { cursor: default !important; }
.widget.collapsed > .widget-body { display: none; }
.widget[data-size="sm"] { width: calc(25%   - 9px);  min-width: 185px; }
.widget[data-size="md"] { width: calc(33.33% - 8px); min-width: 245px; }
.widget[data-size="lg"] { width: calc(50%   - 6px);  min-width: 310px; }
.widget[data-size="xl"] { width: 100%; }
/* Custom pixel width set by drag-resize (overrides data-size) */
.widget[data-custom-w] { width: var(--widget-custom-w); }

/* Floating drag clone */
#widget-drag-clone {
  position: fixed; pointer-events: none; z-index: 9000;
  opacity: .82; box-shadow: 0 8px 32px rgba(0,0,0,.6);
  border: 1px dashed #3a8fff; border-radius: 9px;
  background: #0d1f38; transition: none;
}

/* ── Widget header ──────────────────────────────────────── */
.widget-header {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 11px; cursor: grab; user-select: none;
  border-bottom: 1px solid #141e2e;
  background: linear-gradient(180deg, #0d1c30 0%, #0a1628 100%);
  flex-shrink: 0; border-radius: 9px 9px 0 0;
}
.widget-header:active { cursor: grabbing; }
/* BUG-06: SVG icon in header */
.widget-hicon { width: 16px; height: 16px; flex-shrink: 0; color: #3a8fff; display: flex; align-items: center; justify-content: center; }
.widget-hicon svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; display: block; }
.widget-title  { font-size: 11px; font-weight: 600; color: #8bbfff; flex: 1;
                 letter-spacing: .3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.widget-meta   { font-size: 10px; color: #334; flex-shrink: 0; margin-right: 2px; }
.widget-ctrl   { display: flex; gap: 1px; flex-shrink: 0; }
.widget-ctrl button {
  background: none; border: none; color: #334; cursor: pointer;
  font-size: 11px; padding: 2px 5px; border-radius: 3px; line-height: 1; transition: color .1s, background .1s;
}
.widget-ctrl button:hover { color: #8bbfff; background: #122040; }
.widget-ctrl .w-pin.active { color: #3a8fff; }
/* Pin icon as SVG via pseudo */
.w-pin::before { content: ''; display: inline-block; }

/* ── Widget body ────────────────────────────────────────── */
.widget-body { padding: 11px; flex: 1; overflow: hidden; font-size: 13px; }

/* ── BUG-05: Resize handle ──────────────────────────────── */
.widget-resize-handle {
  position: absolute; right: -4px; top: 20%; bottom: 20%;
  width: 8px; cursor: ew-resize; z-index: 10;
  display: flex; align-items: center; justify-content: center;
}
.widget-resize-handle::after {
  content: ''; display: block; width: 3px; height: 24px;
  background: rgba(58,143,255,.0); border-radius: 2px;
  transition: background .15s;
}
.widget-resize-handle:hover::after,
.widget-resize-handle.resizing::after { background: rgba(58,143,255,.6); }

/* ── Inner components ───────────────────────────────────── */
.stat-label { font-size: 10px; color: #445; text-transform: uppercase; letter-spacing: .6px; }
.stat-val   { font-size: 19px; font-weight: 700; color: #e0ecff; }
.stat-sub   { font-size: 11px; color: #4a6a8a; margin-top: 2px; }
.pbar-bg  { background: #0d1c30; border-radius: 4px; height: 5px; overflow: hidden; margin: 3px 0 10px; }
.pbar     { height: 5px; border-radius: 4px; background: #3a8fff; }
.pbar.warn { background: #f0c050; }
.pbar.crit { background: #f07e7e; }
.tiny-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.tiny-table th { color: #334; font-weight: 500; text-align: left; padding: 2px 5px;
                 border-bottom: 1px solid #141e2e; font-size: 10px; text-transform: uppercase; letter-spacing: .4px; }
.tiny-table td { padding: 4px 5px; color: #9ab; border-bottom: 1px solid #0e1624; vertical-align: middle; }
.tiny-table tr:last-child td { border-bottom: none; }
.wbadge  { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.wbg     { background: #0a2818; color: #3ef07e; border: 1px solid #1a5030; }
.wbr     { background: #280a0a; color: #f07e7e; border: 1px solid #501a1a; }
.wby     { background: #281a00; color: #f0c050; border: 1px solid #503000; }
.wbb     { background: #0a1828; color: #7ebff0; border: 1px solid #1a3050; }
.sparkwrap { margin: 6px 0 2px; line-height: 0; }
.wno-data  { color: #2a3a50; font-size: 12px; text-align: center; padding: 14px 0; }
.isk-pos   { color: #3ef07e; }
.isk-neg   { color: #f07e7e; }

/* ── Widget picker modal ────────────────────────────────── */
#wgt-picker {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.78); align-items: center; justify-content: center;
}
#wgt-picker.open { display: flex; }
.picker-box {
  background: #0d1628; border: 1px solid #2a4060; border-radius: 12px;
  padding: 20px; width: 560px; max-width: 95vw; max-height: 80vh; overflow-y: auto;
}
.picker-box h2 { margin: 0 0 12px; font-size: 14px; color: #8bbfff; }
.picker-grid   { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; }
.wgt-tile {
  display: flex; flex-direction: column; gap: 3px; padding: 9px; border-radius: 6px;
  border: 1px solid #1a2840; cursor: pointer; background: #09111e; transition: all .12s;
}
.wgt-tile:hover   { border-color: #3a8fff; background: #0d1f38; }
.wgt-tile.enabled { border-color: #1a4030; background: #091810; }
.wt-icon  { font-size: 16px; line-height: 1; }
.wt-name  { font-size: 11px; font-weight: 600; color: #8bbfff; }
.wt-desc  { font-size: 10px; color: #334; }
.wt-state { font-size: 10px; margin-top: 2px; }
#picker-close {
  margin-top: 14px; padding: 6px 20px; border-radius: 6px;
  background: #0f2044; border: 1px solid #3a8fff; color: #8bbfff; cursor: pointer; font-size: 12px;
}
</style>

<!-- ── Char bar ─────────────────────────────────────────────────────── -->
<div id="char-bar">
  <div id="char-cards"></div>
  <div style="flex:1"></div>
  <span id="dash-refresh-msg"></span>
  <button id="btn-add-widget" onclick="openPicker()">&#xff0b; Widgets</button>

<!-- ── Widget grid ──────────────────────────────────────────────────── -->
<div id="widget-grid"></div>

<!-- ── Widget picker modal ─────────────────────────────────────────── -->
<div id="wgt-picker">
  <div class="picker-box">
    <h2>Manage Widgets</h2>
    <div id="picker-grid" class="picker-grid"></div>
    <br/>
    <button id="picker-close" onclick="closePicker()">Done</button>
  </div>
</div>

<script>
'use strict';
var API='/app/api', IMG='https://images.evetech.net';

function fmtISK(n){
  if(n==null||isNaN(n))return '\u2014';
  var a=Math.abs(n),s=n<0?'-':'';
  if(a>=1e12)return s+(a/1e12).toFixed(2)+' T';
  if(a>=1e9) return s+(a/1e9).toFixed(2)+' B';
  if(a>=1e6) return s+(a/1e6).toFixed(2)+' M';
  if(a>=1e3) return s+(a/1e3).toFixed(1)+' K';
  return s+Math.round(a).toLocaleString();
}
function fmtDate(s){
  if(!s)return '\u2014';
  try{return new Date(s).toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
  catch(e){return s;}
}
function fmtCountdown(iso){
  if(!iso)return '\u2014';
  var ms=new Date(iso)-Date.now();
  if(ms<=0)return '<span class="wbadge wbg">Done</span>';
  var h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);
  if(h>24)return Math.floor(h/24)+'d '+(h%24)+'h';
  return h>0?h+'h '+m+'m':m+'m';
}
async function jget(url){
  var r=await fetch(url,{credentials:'include'});
  if(!r.ok){var t=await r.text();throw new Error(r.status+': '+t.slice(0,100));}
  return r.json();
}
function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function secColor(v){var n=parseFloat(v||0);return n<0?'#f07e7e':n<0.5?'#f0c050':'#3ef07e';}

/* SVG sparkline */
function sparkline(pts,w,h){
  w=w||220;h=h||42;
  if(!pts||pts.length<2)return '<div class="wno-data" style="padding:6px 0">No history</div>';
  var vals=pts.map(function(p){return p.delta!=null?p.delta:(p.value||0);});
  var min=Math.min.apply(null,vals),max=Math.max.apply(null,vals),range=max-min||1;
  var color=vals.every(function(v){return v<=0;})?'#f07e7e':'#3a8fff';
  var xs=pts.map(function(_,i){return(i/(pts.length-1))*w;});
  var ys=vals.map(function(v){return h-((v-min)/range)*(h-6)-3;});
  var d=xs.map(function(x,i){return(i===0?'M':'L')+x.toFixed(1)+','+ys[i].toFixed(1);}).join(' ');
  var fill=d+' L'+w+','+h+' L0,'+h+' Z';
  return '<svg viewBox="0 0 '+w+' '+h+'" width="'+w+'" height="'+h+'" style="display:block;overflow:visible">'
    +'<defs><linearGradient id="dsg" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0%" stop-color="'+color+'" stop-opacity=".3"/>'
    +'<stop offset="100%" stop-color="'+color+'" stop-opacity="0"/>'
    +'</linearGradient></defs>'
    +'<path d="'+fill+'" fill="url(#dsg)"/>'
    +'<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linejoin="round"/>'
    +'</svg>';
}

/* ══ WIDGET REGISTRY ══════════════════════════════════════════════════ */
/* BUG-06: SVG icon strings for each widget — consistent with app's icon style */
var WIDGET_ICONS={
  char_bio:      '<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>',
  wallet:        '<svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="13" rx="2"/><path d="M16 14a1 1 0 100-2 1 1 0 000 2z" fill="currentColor" stroke="none"/><path d="M2 10h20M7 3l5 4 5-4"/></svg>',
  skill_queue:   '<svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>',
  industry:      '<svg viewBox="0 0 24 24"><path d="M2 20h20M4 20V10l6-4v4l6-4v4l4-2v12"/></svg>',
  pi:            '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><ellipse cx="12" cy="12" rx="4" ry="9"/><line x1="3" y1="12" x2="21" y2="12"/></svg>',
  market_orders: '<svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
  notifications: '<svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>',
  location:      '<svg viewBox="0 0 24 24"><path d="M12 22s-8-5.686-8-12a8 8 0 1116 0c0 6.314-8 12-8 12z"/><circle cx="12" cy="10" r="3"/></svg>',
  relay:         '<svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0114.08 0M1.42 9a16 16 0 0121.16 0M8.53 16.11a6 6 0 016.95 0"/><circle cx="12" cy="20" r="1" fill="currentColor" stroke="none"/></svg>',
  assets:        '<svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>',
  structures:    '<svg viewBox="0 0 24 24"><rect x="4" y="10" width="16" height="11" rx="1"/><path d="M4 10l8-7 8 7"/><rect x="9" y="14" width="6" height="7"/></svg>',
};
var WIDGET_DEFS={
  char_bio:      {title:'Character',       size:'md',desc:'Portrait, corp, online status'},
  wallet:        {title:'Wallet',          size:'md',desc:'Balance + 7-day sparkline'},
  skill_queue:   {title:'Skill Queue',     size:'lg',desc:'Training progress bars'},
  industry:      {title:'Industry Jobs',   size:'lg',desc:'Active job countdowns'},
  pi:            {title:'Planetary Int.',  size:'md',desc:'PI planets & extractor status'},
  market_orders: {title:'Market Orders',   size:'md',desc:'Active buy/sell orders'},
  notifications: {title:'Notifications',   size:'md',desc:'ESI notification feed'},
  location:      {title:'Location',        size:'md',desc:'Current system & ship'},
  relay:         {title:'Corp Relay',      size:'md',desc:'Online corp members'},
  assets:        {title:'Assets Summary',  size:'sm',desc:'Quick stat counters'},
  structures:    {title:'Structures',      size:'md',desc:'Fuel & timers (coming soon)'},
};
var DEFAULT_ORDER=['char_bio','wallet','skill_queue','industry','pi','market_orders','notifications','location','relay','assets','structures'];
var SIZE_CYCLE=['sm','md','lg','xl'];

/* ══ CONFIG (localStorage) ═══════════════════════════════════════════ */
function cfgKey(alias){return 'stellar_dash2_'+alias;}
function loadCfg(alias){
  try{var r=localStorage.getItem(cfgKey(alias));if(r){var p=JSON.parse(r);if(Array.isArray(p)&&p.length)return p;}}catch(e){}
  return buildDefaultCfg();
}
function saveCfg(alias,cfg){try{localStorage.setItem(cfgKey(alias),JSON.stringify(cfg));}catch(e){}}
function buildDefaultCfg(){
  return DEFAULT_ORDER.map(function(id){
    return{id:id,visible:true,pinned:false,collapsed:false,size:(WIDGET_DEFS[id]?WIDGET_DEFS[id].size:'md')};
  });
}
function resetLayout(){
  if(!_alias)return;
  if(!confirm('Reset all widget positions and visibility to default?'))return;
  saveCfg(_alias,buildDefaultCfg());renderGrid(_alias,_dash);
}

/* ══ BUG-05: MOUSE-EVENT DRAG-TO-REORDER ═════════════════════════════ */
/* Replaces HTML5 dragstart/dragover/drop which is unreliable in WebView2 */
var _drag={active:false,id:null,clone:null,alias:null,startX:0,startY:0,moved:false};

function _saveDomOrder(alias){
  var cfg=loadCfg(alias);
  var dom=[].slice.call(document.querySelectorAll('#widget-grid .widget')).map(function(w){return w.dataset.id;});
  var vis=dom.map(function(wid){var ex=cfg.find(function(c){return c.id===wid;});return ex||{id:wid,visible:true,pinned:false,collapsed:false,size:(WIDGET_DEFS[wid]?WIDGET_DEFS[wid].size:'md')};});
  var hid=cfg.filter(function(c){return!c.visible&&!vis.find(function(v){return v.id===c.id;});});
  saveCfg(alias,vis.concat(hid));
}

function _widgetFromPoint(x,y,skipId){
  var els=document.querySelectorAll('#widget-grid .widget');
  for(var i=0;i<els.length;i++){
    var w=els[i];
    if(w.dataset.id===skipId||w.classList.contains('pinned'))continue;
    var r=w.getBoundingClientRect();
    if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)return w;
  }
  return null;
}

function attachDrag(el,alias){
  var header=el.querySelector('.widget-header');
  if(!header)return;
  header.addEventListener('mousedown',function(e){
    if(e.button!==0)return;
    if(el.classList.contains('pinned'))return;
    // Don't start drag on control buttons
    if(e.target.closest('.widget-ctrl'))return;
    e.preventDefault();
    _drag.active=false;_drag.moved=false;
    _drag.id=el.dataset.id;_drag.alias=alias;
    _drag.startX=e.clientX;_drag.startY=e.clientY;
    _drag.el=el;
    document.addEventListener('mousemove',_onDragMove);
    document.addEventListener('mouseup',_onDragEnd);
  });
}

function _onDragMove(e){
  if(!_drag.id)return;
  var dx=e.clientX-_drag.startX,dy=e.clientY-_drag.startY;
  if(!_drag.active&&(Math.abs(dx)>5||Math.abs(dy)>5)){
    // Drag threshold crossed — create floating clone
    _drag.active=true;_drag.moved=true;
    var r=_drag.el.getBoundingClientRect();
    var clone=document.createElement('div');
    clone.id='widget-drag-clone';
    clone.style.cssText='width:'+r.width+'px;height:'+r.height+'px;left:'+r.left+'px;top:'+r.top+'px;';
    clone.innerHTML='<div class="widget-header" style="border-radius:9px;padding:8px 11px;background:linear-gradient(180deg,#0d1c30,#0a1628);display:flex;align-items:center;gap:7px">'
      +(_drag.el.querySelector('.widget-header').innerHTML)+'</div>';
    document.body.appendChild(clone);
    _drag.clone=clone;
    _drag.el.classList.add('drag-ghost');
  }
  if(_drag.active&&_drag.clone){
    var r=_drag.el.getBoundingClientRect();
    _drag.clone.style.left=(r.left+dx)+'px';
    _drag.clone.style.top=(r.top+dy)+'px';
    // Highlight drop target
    document.querySelectorAll('.drop-target').forEach(function(w){w.classList.remove('drop-target');});
    var target=_widgetFromPoint(e.clientX,e.clientY,_drag.id);
    if(target)target.classList.add('drop-target');
  }
}

function _onDragEnd(e){
  document.removeEventListener('mousemove',_onDragMove);
  document.removeEventListener('mouseup',_onDragEnd);
  if(_drag.clone){_drag.clone.remove();_drag.clone=null;}
  document.querySelectorAll('.drop-target').forEach(function(w){w.classList.remove('drop-target');});
  if(_drag.el)_drag.el.classList.remove('drag-ghost');
  if(_drag.active&&_drag.moved){
    var target=_widgetFromPoint(e.clientX,e.clientY,_drag.id);
    if(target){
      var grid=document.getElementById('widget-grid');
      var items=[].slice.call(grid.children);
      var from=_drag.el,fi=items.indexOf(from),ti=items.indexOf(target);
      if(fi!==ti){
        if(fi<ti)grid.insertBefore(from,target.nextSibling);else grid.insertBefore(from,target);
        _saveDomOrder(_drag.alias);
      }
    }
  }
  _drag={active:false,id:null,clone:null,alias:null,startX:0,startY:0,moved:false,el:null};
}

/* ══ BUG-05: DRAG-TO-RESIZE ══════════════════════════════════════════ */
var _resize={active:false,el:null,startX:0,startW:0,alias:null};
var _SIZE_BREAKPOINTS={sm:185,md:245,lg:310,xl:99999};

function attachResize(el,alias){
  var handle=el.querySelector('.widget-resize-handle');
  if(!handle)return;
  handle.addEventListener('mousedown',function(e){
    if(e.button!==0)return;
    e.preventDefault();e.stopPropagation();
    _resize.active=true;_resize.el=el;_resize.alias=alias;
    _resize.startX=e.clientX;_resize.startW=el.getBoundingClientRect().width;
    handle.classList.add('resizing');
    document.addEventListener('mousemove',_onResizeMove);
    document.addEventListener('mouseup',_onResizeEnd);
  });
}

function _onResizeMove(e){
  if(!_resize.active)return;
  var newW=Math.max(160,_resize.startW+(e.clientX-_resize.startX));
  _resize.el.style.setProperty('--widget-custom-w',newW+'px');
  _resize.el.setAttribute('data-custom-w','1');
  _resize.el.style.width=newW+'px';
}

function _onResizeEnd(e){
  document.removeEventListener('mousemove',_onResizeMove);
  document.removeEventListener('mouseup',_onResizeEnd);
  var handle=_resize.el?_resize.el.querySelector('.widget-resize-handle'):null;
  if(handle)handle.classList.remove('resizing');
  if(!_resize.active)return;
  // Snap to nearest named size based on final pixel width
  var finalW=_resize.el.getBoundingClientRect().width;
  var best='xl',bestDist=Infinity;
  var grid=document.getElementById('widget-grid');
  var gridW=grid?grid.getBoundingClientRect().width:window.innerWidth;
  var sizeMap={sm:gridW*0.25,md:gridW*0.3333,lg:gridW*0.50,xl:gridW};
  Object.keys(sizeMap).forEach(function(sz){
    var d=Math.abs(finalW-sizeMap[sz]);if(d<bestDist){bestDist=d;best=sz;}
  });
  // Apply named size (remove custom override)
  _resize.el.style.width='';
  _resize.el.removeAttribute('data-custom-w');
  _resize.el.style.removeProperty('--widget-custom-w');
  _resize.el.setAttribute('data-size',best);
  // Persist
  var cfg=loadCfg(_resize.alias);
  var wid=_resize.el.dataset.id;
  var item=cfg.find(function(c){return c.id===wid;});
  if(item){item.size=best;saveCfg(_resize.alias,cfg);}
  _resize={active:false,el:null,startX:0,startW:0,alias:null};
}

/* ══ WIDGET BUILDER ═══════════════════════════════════════════════════ */
/* BUG-06: SVG icons; BUG-05: pointer-event drag + resize handle        */
/* BUG-05: pin button now correctly locks drag and persists state        */
function buildWidgetEl(id,state,alias){
  var def=WIDGET_DEFS[id];if(!def)return null;
  var sz=state.size||def.size;
  var icon=WIDGET_ICONS[id]||'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>';
  var el=document.createElement('div');
  el.className='widget'+(state.pinned?' pinned':'')+(state.collapsed?' collapsed':'');
  el.dataset.id=id;el.setAttribute('data-size',sz);
  el.innerHTML=
    '<div class="widget-header">'
    +'<span class="widget-hicon">'+icon+'</span>'
    +'<span class="widget-title">'+esc(def.title)+'</span>'
    +'<span class="widget-meta" id="wm-'+id+'"></span>'
    +'<div class="widget-ctrl">'
    +'<button class="w-sz" title="Cycle size" onclick="cycleSize(\''+id+'\',\''+alias+'\')">'
      +'<svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="14" height="6" rx="1"/></svg>'
    +'</button>'
    +'<button class="w-col" title="Collapse/Expand" onclick="toggleCollapse(\''+id+'\',\''+alias+'\',this)">'
      +(state.collapsed
        ?'<svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>'
        :'<svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="8" x2="14" y2="8"/></svg>'
      )
    +'</button>'
    +'<button class="w-pin'+(state.pinned?' active':'')+'" title="Pin (locks position)"'
      +' onclick="togglePin(\''+id+'\',\''+alias+'\',this)">'
      +'<svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 2l4 4-2 2-3-1-4 4v2H3v-2L7 7 6 4l4-2z"/><line x1="6" y1="10" x2="2" y2="14"/></svg>'
    +'</button>'
    +'<button class="w-del" title="Remove widget" onclick="removeWidget(\''+id+'\',\''+alias+'\')">'
      +'<svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg>'
    +'</button>'
    +'</div></div>'
    +'<div class="widget-body" id="wb-'+id+'"><div class="wno-data">Loading\u2026</div></div>'
    +'<div class="widget-resize-handle" title="Drag to resize"></div>';
  attachDrag(el,alias);
  attachResize(el,alias);
  return el;
}
function cycleSize(id,alias){
  var cfg=loadCfg(alias),item=cfg.find(function(c){return c.id===id;});if(!item)return;
  var idx=SIZE_CYCLE.indexOf(item.size||'md');item.size=SIZE_CYCLE[(idx+1)%SIZE_CYCLE.length];
  saveCfg(alias,cfg);
  var el=document.querySelector('.widget[data-id="'+id+'"]');
  if(el){el.setAttribute('data-size',item.size);el.style.width='';el.removeAttribute('data-custom-w');}
}
function toggleCollapse(id,alias,btn){
  var cfg=loadCfg(alias),item=cfg.find(function(c){return c.id===id;});if(!item)return;
  item.collapsed=!item.collapsed;saveCfg(alias,cfg);
  var el=document.querySelector('.widget[data-id="'+id+'"]');
  if(el){
    el.classList.toggle('collapsed',item.collapsed);
    // Swap collapse icon
    btn.innerHTML=item.collapsed
      ?'<svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>'
      :'<svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="8" x2="14" y2="8"/></svg>';
  }
}
function togglePin(id,alias,btn){
  var cfg=loadCfg(alias),item=cfg.find(function(c){return c.id===id;});if(!item)return;
  item.pinned=!item.pinned;saveCfg(alias,cfg);
  var el=document.querySelector('.widget[data-id="'+id+'"]');
  if(el){
    el.classList.toggle('pinned',item.pinned);
    // BUG-05: pinned state is purely managed by the .pinned CSS class;
    // the mouse-drag handler checks classList before starting a drag.
    btn.classList.toggle('active',item.pinned);
    // Update header cursor via CSS (pointer vs grab)
    var hdr=el.querySelector('.widget-header');
    if(hdr)hdr.style.cursor=item.pinned?'default':'grab';
  }
}
function removeWidget(id,alias){
  var cfg=loadCfg(alias),item=cfg.find(function(c){return c.id===id;});
  if(item){item.visible=false;saveCfg(alias,cfg);}
  var el=document.querySelector('.widget[data-id="'+id+'"]');if(el)el.remove();
  if(document.getElementById('wgt-picker').classList.contains('open'))renderPicker(alias);
}

/* ══ PICKER ═══════════════════════════════════════════════════════════ */
function openPicker(){document.getElementById('wgt-picker').classList.add('open');renderPicker(_alias);}
function closePicker(){document.getElementById('wgt-picker').classList.remove('open');}
function renderPicker(alias){
  var cfg=loadCfg(alias);
  document.getElementById('picker-grid').innerHTML=Object.keys(WIDGET_DEFS).map(function(id){
    var def=WIDGET_DEFS[id];
    var state=cfg.find(function(c){return c.id===id;});
    var on=!!(state&&state.visible);
    var icon=WIDGET_ICONS[id]||'';
    return '<div class="wgt-tile'+(on?' enabled':'')+'" onclick="toggleWidget(\''+id+'\',\''+alias+'\')">'
      +'<span class="wt-icon" style="display:flex;align-items:center;color:#3a8fff">'+icon+'</span>'
      +'<span class="wt-name">'+esc(def.title)+'</span>'
      +'<span class="wt-desc">'+esc(def.desc)+'</span>'
      +'<span class="wt-state wbadge '+(on?'wbg':'wbb')+'">'+(on?'\u25cf Visible':'\u25cb Hidden')+'</span>'
      +'</div>';
  }).join('');
}
function toggleWidget(id,alias){
  var cfg=loadCfg(alias),ex=cfg.find(function(c){return c.id===id;});
  if(ex){
    ex.visible=!ex.visible;saveCfg(alias,cfg);
    if(ex.visible)addWidgetToGrid(id,ex,alias);
    else{var el=document.querySelector('.widget[data-id="'+id+'"]');if(el)el.remove();}
  } else {
    var s={id:id,visible:true,pinned:false,collapsed:false,size:(WIDGET_DEFS[id]?WIDGET_DEFS[id].size:'md')};
    cfg.push(s);saveCfg(alias,cfg);addWidgetToGrid(id,s,alias);
  }
  renderPicker(alias);
}

/* ══ GRID RENDER ══════════════════════════════════════════════════════ */
var _alias=null,_dash=null;
function renderGrid(alias,dash){
  _alias=alias;_dash=dash;
  var grid=document.getElementById('widget-grid');grid.innerHTML='';
  loadCfg(alias).filter(function(c){return c.visible;}).forEach(function(state){
    var el=buildWidgetEl(state.id,state,alias);
    if(el){grid.appendChild(el);fillWidget(state.id,alias,dash);}
  });
}
function addWidgetToGrid(id,state,alias){
  var el=buildWidgetEl(id,state,alias);if(!el)return;
  document.getElementById('widget-grid').appendChild(el);fillWidget(id,alias,_dash);
}

/* ══ FILL DISPATCHER ══════════════════════════════════════════════════ */
async function fillWidget(id,alias,dash){
  var body=document.getElementById('wb-'+id);if(!body)return;
  try{
    var html;
    switch(id){
      case 'char_bio':      html=renderCharBio(dash,alias);break;
      case 'wallet':        html=await renderWallet(alias,dash);break;
      case 'skill_queue':   html=renderSkillQueue(dash);break;
      case 'industry':      html=renderIndustry(dash);break;
      case 'pi':            html=renderPI(dash);break;
      case 'market_orders': html=await renderMarketOrders(alias);break;
      case 'notifications': html=await renderNotifications(alias);break;
      case 'location':      html=renderLocation(dash);break;
      case 'relay':         html=await renderRelay();break;
      case 'assets':        html=renderAssets(dash);break;
      case 'structures':    html=renderStructures();break;
      default:              html='<div class="wno-data">Unknown widget</div>';
    }
    body.innerHTML=html;
  }catch(e){body.innerHTML='<div class="wno-data">Error: '+esc(e.message)+'</div>';console.error('Widget '+id+':',e);}
}

/* ══ SKILL QUEUE ══════════════════════════════════════════════════════ */
function renderSkillQueue(dash){
  var q=Array.isArray(dash.skill_queue)?dash.skill_queue:[];
  if(!q.length)return '<div class="wno-data">No active skill training</div>';
  var now=Date.now(),LVL=['I','II','III','IV','V'];
  var rows=q.slice(0,8).map(function(s){
    var lvl=s.finished_level?(LVL[s.finished_level-1]||s.finished_level):'';
    var name=esc((s.skill_name||('Skill '+s.skill_id))+(lvl?' '+lvl:''));
    var end=s.finish_date?new Date(s.finish_date):null;
    var st=s.start_date?new Date(s.start_date):null;
    var tot=end&&st?end-st:0;
    var elp=end?Math.max(0,Math.min(tot,now-(st||now))):0;
    var pct=tot>0?Math.min(100,elp/tot*100):0;
    var barCls=pct>90?'pbar crit':pct>60?'pbar warn':'pbar';
    return '<div style="margin-bottom:8px">'
      +'<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px">'
      +'<span style="color:#c8d4e0">'+name+'</span>'
      +'<span style="color:#334;font-size:10px">'+fmtCountdown(s.finish_date)+'</span></div>'
      +'<div class="pbar-bg"><div class="'+barCls+'" style="width:'+pct.toFixed(1)+'%"></div></div></div>';
  }).join('');
  var meta=document.getElementById('wm-skill_queue');if(meta)meta.textContent=q.length+' in queue';
  return rows+(q.length>8?'<div style="font-size:11px;color:#334;text-align:center">+'+(q.length-8)+' more</div>':'');
}

  var notifs=d.notifications||[];
  if(!notifs.length)return '<div class="wno-data">No recent notifications</div>';
  var ICONS={StructureUnderAttack:'\u2694\uFE0F',StructureLostArmor:'\uD83D\uDD25',StructureLostShields:'\uD83D\uDEE1\uFE0F',StructureDestroyed:'\uD83D\uDCA5',StructureOnlineAboutToEnd:'\u26FD',SovStructureDestroyed:'\uD83D\uDCA5',SovAllClaimAquiredMsg:'\uD83C\uDFF4',AllWarDeclaredMsg:'\u26A0\uFE0F',CorpWarDeclaredMsg:'\u26A0\uFE0F',CharLeftCorpMsg:'\uD83D\uDEAA',CharAppAcceptMsg:'\u2705',BillOutOfMoneyMsg:'\uD83D\uDCB8',IHubDestroyedByBillFailure:'\uD83D\uDCA5',KillReportVictim:'\u2620\uFE0F',KillReportFinalBlow:'\u2694\uFE0F'};
  var unread=notifs.filter(function(n){return!n.is_read;}).length;
  var meta=document.getElementById('wm-notifications');if(meta&&unread)meta.textContent=unread+' unread';
  var rows=notifs.slice(0,12).map(function(n){
    var icon=ICONS[n.type]||'\uD83D\uDCE8';
    var dim=n.is_read?'color:#556':'color:#c8d4e0';
    return '<div style="display:flex;gap:7px;padding:4px 0;border-bottom:1px solid #0e1624;align-items:flex-start">'
      +'<span style="font-size:12px;margin-top:1px;flex-shrink:0">'+icon+'</span>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:11px;'+dim+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(n.type||'Notification')+'</div>'
      +'<div style="font-size:10px;color:#334;margin-top:1px">'+(n.timestamp?fmtDate(n.timestamp):'\u2014')+'</div></div>'
      +(!n.is_read?'<div style="width:5px;height:5px;border-radius:50%;background:#3a8fff;margin-top:5px;flex-shrink:0"></div>':'')
      +'</div>';
  }).join('');
  return '<div style="max-height:280px;overflow-y:auto">'+rows+'</div>';
}

/* ══ LOCATION ═════════════════════════════════════════════════════════ */
function renderLocation(dash){
  var loc=dash.location||{},ship=dash.ship||{};
  var sys=esc(loc.system_name||loc.solar_system_name||'\u2014');
  var ltype=esc(loc.location_type||'');
  var tid=ship.ship_type_id;
  return '<div style="display:flex;gap:11px;align-items:flex-start">'
    +(tid?'<img src="'+IMG+'/types/'+tid+'/icon?size=64" width="48" height="48"'
      +' style="border-radius:5px;border:1px solid #1e2d45;background:#0d1c30;flex-shrink:0"'
      +' onerror="this.style.display=\'none\'"/>':'')
    +'<div style="min-width:0">'
    +'<div style="font-size:15px;font-weight:700;color:#e0ecff;margin-bottom:2px">'+sys+'</div>'
    +(ltype?'<div style="font-size:11px;color:#445;margin-bottom:7px">'+ltype+'</div>':'')
    +'<div style="font-size:12px;color:#8bbfff;margin-bottom:2px">'+esc(ship.ship_name||'\u2014')+'</div>'
    +'<div style="font-size:11px;color:#445">'+esc(ship.ship_type_name||'\u2014')+'</div>'
    +'</div></div>';
}

/* ══ RELAY ════════════════════════════════════════════════════════════ */
async function renderRelay(){
  try{
    var d=await jget(API+'/corp/relay/members');
    var members=d.members||d.pilots||[];
    if(!members.length)throw new Error('empty');
    var meta=document.getElementById('wm-relay');if(meta)meta.textContent=members.length+' online';
    var rows=members.slice(0,10).map(function(m){
      return '<tr><td>'+esc(m.character_name||m.name||'?')+'</td>'
        +'<td style="color:#445">'+esc(m.system||m.location||'\u2014')+'</td>'
        +'<td style="color:#334">'+esc(m.ship||'\u2014')+'</td></tr>';
    }).join('');
    return '<table class="tiny-table"><thead><tr><th>Pilot</th><th>System</th><th>Ship</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }catch(e){
    return '<div class="wno-data">Relay not connected<div style="font-size:11px;color:#223;margin-top:3px">Settings \u2192 Corp Sharing</div></div>';
  }
}

/* ══ ASSETS SUMMARY ═══════════════════════════════════════════════════ */
function renderAssets(dash){
  var pi=dash.pi&&dash.pi.planet_count!=null?dash.pi.planet_count:(Array.isArray(dash.pi_planets)?dash.pi_planets.length:null);
  var jobs=Array.isArray(dash.industry_jobs)?dash.industry_jobs.length:(dash.industry&&dash.industry.active_count!=null?dash.industry.active_count:0);
  var sqLen=Array.isArray(dash.skill_queue)?dash.skill_queue.length:(dash.skills&&dash.skills.queue_len!=null?dash.skills.queue_len:0);
  var next=Array.isArray(dash.skill_queue)&&dash.skill_queue[0]?fmtCountdown(dash.skill_queue[0].finish_date):'\u2014';
  var tile='style="text-align:center;padding:8px;background:#08121e;border-radius:5px;border:1px solid #141e2e"';
  return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">'
    +'<div '+tile+'><div class="stat-label">Industry</div><div style="font-size:20px;font-weight:700;color:#e0ecff">'+jobs+'</div><div style="font-size:10px;color:#334">active</div></div>'
    +'<div '+tile+'><div class="stat-label">PI</div><div style="font-size:20px;font-weight:700;color:#e0ecff">'+(pi!=null?pi:'\u2014')+'</div><div style="font-size:10px;color:#334">colonies</div></div>'
    +'<div '+tile+'><div class="stat-label">Skills</div><div style="font-size:20px;font-weight:700;color:#e0ecff">'+sqLen+'</div><div style="font-size:10px;color:#334">in queue</div></div>'
    +'<div '+tile+'><div class="stat-label">Next skill</div><div style="font-size:13px;font-weight:700;color:#8bbfff;margin-top:3px">'+next+'</div></div>'
    +'</div>';
}

function renderStructures(){

/* ══ CHARACTER SWITCHER + INIT ════════════════════════════════════════ */
var _chars=[],_refreshTimer=null;
async function loadCharacters(){
  try{var d=await jget(API+'/eve/linked');return Array.isArray(d)?d:(d.characters||[]);}
  catch(e){return [];}
}
function _safeId(s){return String(s).replace(/\W/g,'_');}

async function buildCharBar(chars,activeAlias){
  _chars=chars;var bar=document.getElementById('char-cards');bar.innerHTML='';
  chars.forEach(function(c){
    var alias=c.alias||c.character_name,cid=c.character_id;
    var card=document.createElement('div');
    card.className='char-card'+(alias===activeAlias?' active':'');
    card.innerHTML='<img class="char-portrait" src="'+IMG+'/characters/'+cid+'/portrait?size=64" alt="" onerror="this.style.display=\'none\'"/>'
      +'<div class="char-status" id="cst-'+_safeId(alias)+'"></div>'
      +'<span>'+esc(c.character_name)+'</span>';
    card.onclick=(function(a){return function(){switchChar(a);};})(alias);
    bar.appendChild(card);
  });
}

async function switchChar(alias){
  _alias=alias;
  document.querySelectorAll('.char-card').forEach(function(c){c.classList.remove('active');});
  var ch=_chars.find(function(c){return(c.alias||c.character_name)===alias;});
  if(ch){document.querySelectorAll('.char-card span').forEach(function(sp){
    if(sp.textContent.trim()===ch.character_name)sp.closest('.char-card').classList.add('active');
  });}
  if(_refreshTimer){clearInterval(_refreshTimer);_refreshTimer=null;}
  await loadDash(alias);
  _refreshTimer=setInterval(function(){loadDash(alias);},60000);
}

async function loadDash(alias){
  var msg=document.getElementById('dash-refresh-msg');if(msg)msg.textContent='Refreshing\u2026';
  try{
    var d=await jget(API+'/eve/dashboard?alias='+encodeURIComponent(alias)+'&include_corp=true');
    _dash=d.dashboard||d;
    var pill=document.getElementById('cst-'+_safeId(alias));
    if(pill){var on=!!(_dash.is_online||(_dash.online&&_dash.online.online));pill.className='char-status '+(on?'online':'offline');}
    renderGrid(alias,_dash);
    if(msg)msg.textContent='Updated '+new Date().toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
  }catch(e){if(msg)msg.textContent='Error';console.error('Dashboard error:',e);}
}

async function init(){
  var chars=await loadCharacters();
  var def=chars.length?((chars.find(function(c){return c.is_default;})||chars[0])):null;
  var defaultAlias=def?(def.alias||def.character_name):'{{ default_alias }}';
  await buildCharBar(chars,defaultAlias);
  await switchChar(defaultAlias);
}
init();
</script>
